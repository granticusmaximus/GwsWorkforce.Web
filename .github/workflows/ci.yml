name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository hygiene check
        run: |
          tracked_generated=$(git ls-files | grep -E '(^|/)bin/|(^|/)obj/|^TestResults/|\.trx$|\.coverage$|\.coveragexml$|\.db$|\.sqlite$|\.sqlite3$' || true)
          if [ -n "$tracked_generated" ]; then
            echo "Tracked generated/unnecessary files detected:"
            echo "$tracked_generated"
            echo "Please remove these from git tracking and rely on .gitignore."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GwsWorkforce.Web.csproj

      - name: Build (warnings as errors)
        run: dotnet build GwsWorkforce.Web.csproj -c Release --no-restore -warnaserror

      - name: Test discovery and execution
        run: |
          test_projects=$(find . -name "*.Tests.csproj")
          if [ -n "$test_projects" ]; then
            while IFS= read -r project; do
              echo "Testing $project"
              dotnet test "$project" -c Release
            done <<< "$test_projects"
          else
            echo "No test projects found yet."
          fi

      - name: Install EF tool
        run: dotnet tool install --global dotnet-ef

      - name: Migration safety check
        env:
          PATH: ${{ env.PATH }}:/home/runner/.dotnet/tools
        run: |
          rm -f Data/app.db
          dotnet ef database update
